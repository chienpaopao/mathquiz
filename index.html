<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學題目辨識練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
<style>
/* ── Reset & Variables ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–ink:    #18120a;
–paper:  #faf7f2;
–cream:  #f0ead8;
–gold:   #b8852a;
–gold2:  #e8b84b;
–rust:   #c0392b;
–sage:   #2e7d5a;
–sky:    #1a6fa8;
–border: #d4c9b0;
–muted:  #8a7f70;
–shadow: rgba(24,18,10,0.12);
}

html { scroll-behavior: smooth; }

body {
background: var(–paper);
color: var(–ink);
font-family: ‘Noto Serif TC’, serif;
min-height: 100vh;
padding-bottom: 60px;
}

/* lined paper background */
body::before {
content: ‘’;
position: fixed; inset: 0; z-index: 0; pointer-events: none;
background-image:
repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,150,80,0.1) 27px, rgba(180,150,80,0.1) 28px);
}

/* red margin line */
body::after {
content: ‘’;
position: fixed; top: 0; left: 72px; bottom: 0; width: 1px; z-index: 0; pointer-events: none;
background: rgba(192,57,43,0.2);
}

.wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 24px; }

/* ── Header ────────────────────────────────────────────────────────── */
header {
padding: 36px 0 20px;
border-bottom: 2px solid var(–ink);
margin-bottom: 32px;
display: flex;
justify-content: space-between;
align-items: flex-end;
flex-wrap: wrap;
gap: 12px;
}

.brand-title {
font-size: clamp(1.4rem, 4vw, 2.1rem);
font-weight: 900;
letter-spacing: 0.08em;
line-height: 1;
}

.brand-title span { color: var(–gold); }

.brand-sub {
font-family: ‘Fira Code’, monospace;
font-size: 0.68rem;
color: var(–muted);
letter-spacing: 0.2em;
text-transform: uppercase;
margin-top: 5px;
}

.stats-row { display: flex; gap: 20px; }

.stat { text-align: center; }
.stat-n { font-size: 1.6rem; font-weight: 900; color: var(–gold); line-height: 1; }
.stat-l { font-family: ‘Fira Code’, monospace; font-size: 0.6rem; color: var(–muted); letter-spacing: 0.1em; }

/* ── API Key panel ─────────────────────────────────────────────────── */
.api-panel {
background: #fff8ee;
border: 1.5px solid var(–gold);
border-radius: 4px;
padding: 18px 20px;
margin-bottom: 24px;
position: relative;
}

.api-panel::before {
content: ‘🔑 Gemini API 金鑰設定（免費）’;
font-family: ‘Fira Code’, monospace;
font-size: 0.68rem;
letter-spacing: 0.18em;
color: var(–gold);
text-transform: uppercase;
display: block;
margin-bottom: 10px;
}

.api-row { display: flex; gap: 8px; align-items: center; }

.api-input {
flex: 1;
font-family: ‘Fira Code’, monospace;
font-size: 0.82rem;
padding: 9px 12px;
border: 1px solid var(–border);
border-radius: 3px;
background: var(–paper);
color: var(–ink);
outline: none;
transition: border-color 0.15s;
letter-spacing: 0.05em;
}
.api-input:focus { border-color: var(–gold); }
.api-input.saved { border-color: var(–sage); background: #f0fff4; }

.btn-save {
font-family: ‘Noto Serif TC’, serif;
font-size: 0.82rem;
padding: 9px 18px;
border: 1.5px solid var(–ink);
background: var(–ink);
color: var(–paper);
border-radius: 3px;
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
letter-spacing: 0.05em;
}
.btn-save:hover { background: #3d2e1a; }

.api-hint {
font-size: 0.72rem;
color: var(–muted);
margin-top: 8px;
line-height: 1.6;
}
.api-hint a { color: var(–sky); }

.api-status {
font-family: ‘Fira Code’, monospace;
font-size: 0.72rem;
margin-top: 6px;
}
.api-status.ok  { color: var(–sage); }
.api-status.err { color: var(–rust); }

/* ── Upload zone ───────────────────────────────────────────────────── */
.upload-zone {
border: 2px dashed var(–border);
border-radius: 4px;
padding: 44px 24px;
text-align: center;
cursor: pointer;
transition: all 0.2s;
background: #fff;
margin-bottom: 14px;
position: relative;
overflow: hidden;
}
.upload-zone::before {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(184,133,42,0.06), transparent);
opacity: 0; transition: opacity 0.2s;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(–gold); }
.upload-zone:hover::before, .upload-zone.drag::before { opacity: 1; }

.upload-icon { font-size: 2.8rem; display: block; margin-bottom: 10px; }
.upload-title { font-size: 1rem; font-weight: 700; margin-bottom: 5px; }
.upload-hint-text {
font-family: ‘Fira Code’, monospace;
font-size: 0.72rem;
color: var(–muted);
letter-spacing: 0.05em;
}

#fileInput { display: none; }

/* ── Preview ───────────────────────────────────────────────────────── */
#previewWrap {
display: none;
border: 1px solid var(–border);
border-radius: 4px;
overflow: hidden;
margin-bottom: 14px;
background: #fff;
}
.preview-bar {
display: flex; justify-content: space-between; align-items: center;
padding: 9px 14px;
border-bottom: 1px solid var(–border);
font-family: ‘Fira Code’, monospace;
font-size: 0.72rem;
color: var(–muted);
}
.btn-rm {
background: none; border: 1px solid var(–border); color: var(–muted);
border-radius: 3px; padding: 2px 9px; font-size: 0.68rem; cursor: pointer;
font-family: ‘Fira Code’, monospace; transition: all 0.15s;
}
.btn-rm:hover { border-color: var(–rust); color: var(–rust); }
.preview-img-wrap { padding: 16px; display: flex; justify-content: center; background: #f8f5f0; }
#previewImg { max-width: 100%; max-height: 280px; object-fit: contain; border-radius: 3px; box-shadow: 0 4px 16px var(–shadow); }

/* ── Analyze button ────────────────────────────────────────────────── */
.btn-analyze {
width: 100%; padding: 14px;
background: var(–ink); color: var(–paper);
border: none; border-radius: 4px;
font-family: ‘Noto Serif TC’, serif;
font-size: 1rem; font-weight: 700;
cursor: pointer; letter-spacing: 0.1em;
transition: all 0.2s; margin-bottom: 28px;
position: relative; overflow: hidden;
}
.btn-analyze::after {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
opacity: 0; transition: opacity 0.2s;
}
.btn-analyze:hover:not(:disabled) { background: #3d2e1a; transform: translateY(-1px); box-shadow: 0 4px 16px var(–shadow); }
.btn-analyze:hover:not(:disabled)::after { opacity: 1; }
.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Loading ───────────────────────────────────────────────────────── */
#loadingArea {
display: none; flex-direction: column; align-items: center; gap: 18px; padding: 48px 0;
}
.spinner { position: relative; width: 52px; height: 52px; }
.ring {
position: absolute; inset: 0; border-radius: 50%;
border: 2px solid transparent;
}
.ring:nth-child(1) { border-top-color: var(–gold);  animation: spin 1.1s linear infinite; }
.ring:nth-child(2) { border-right-color: var(–rust); animation: spin 1.7s linear infinite reverse; inset: 7px; }
.ring:nth-child(3) { border-bottom-color: var(–sky); animation: spin 2.3s linear infinite; inset: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
font-family: ‘Fira Code’, monospace; font-size: 0.82rem;
color: var(–muted); letter-spacing: 0.1em;
}

/* ── Error ─────────────────────────────────────────────────────────── */
.error-box {
padding: 16px 18px;
background: #fff5f5; border: 1.5px solid #e8b0b0;
border-radius: 4px; color: var(–rust);
font-size: 0.88rem; line-height: 1.7; text-align: center;
margin-bottom: 16px;
}

/* ── Results ───────────────────────────────────────────────────────── */
#resultsArea { display: none; }

.results-title {
font-size: 1.15rem; font-weight: 900;
border-bottom: 2px solid var(–ink);
padding-bottom: 8px; margin-bottom: 18px;
letter-spacing: 0.05em;
}

.summary-card {
background: #fff;
border: 1px solid var(–border);
border-left: 4px solid var(–gold);
border-radius: 3px;
padding: 15px 18px;
margin-bottom: 20px;
}
.card-label {
font-family: ‘Fira Code’, monospace;
font-size: 0.62rem; letter-spacing: 0.2em;
color: var(–gold); text-transform: uppercase;
margin-bottom: 7px;
}
.summary-text { font-size: 0.9rem; line-height: 1.8; }

/* question cards */
.q-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }

.q-card {
background: #fff;
border: 1px solid var(–border);
border-radius: 3px;
overflow: hidden;
animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}

.q-head {
display: flex; align-items: flex-start; gap: 10px;
padding: 13px 16px; cursor: pointer; user-select: none;
transition: background 0.12s;
border-bottom: 1px solid transparent;
}
.q-head:hover { background: var(–cream); }
.q-card.open .q-head { border-bottom-color: var(–border); background: var(–cream); }

.q-num {
font-family: ‘Fira Code’, monospace; font-size: 0.68rem;
background: var(–cream); border: 1px solid var(–border);
border-radius: 3px; padding: 2px 7px; flex-shrink: 0; color: var(–muted);
}

.q-badge {
font-family: ‘Fira Code’, monospace; font-size: 0.62rem;
letter-spacing: 0.08em; padding: 2px 8px;
border-radius: 20px; border: 1px solid; flex-shrink: 0;
}
.badge-arithmetic { color: #1a6fa8; border-color: #1a6fa8; background: rgba(26,111,168,0.07); }
.badge-algebra    { color: #7c3aed; border-color: #7c3aed; background: rgba(124,58,237,0.07); }
.badge-geometry   { color: var(–sage); border-color: var(–sage); background: rgba(46,125,90,0.07); }
.badge-calculus   { color: #c2410c; border-color: #c2410c; background: rgba(194,65,12,0.07); }
.badge-stats      { color: #be185d; border-color: #be185d; background: rgba(190,24,93,0.07); }
.badge-other      { color: var(–muted); border-color: var(–border); background: var(–cream); }

.q-text { flex: 1; font-size: 0.9rem; line-height: 1.65; }
.q-chevron { font-size: 0.65rem; color: var(–muted); transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
.q-card.open .q-chevron { transform: rotate(180deg); }

.q-body { display: none; padding: 16px; }
.q-card.open .q-body { display: block; }

/* choices */
.choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 13px; }
@media (max-width: 480px) { .choices-grid { grid-template-columns: 1fr; } }

.choice {
display: flex; align-items: flex-start; gap: 9px;
padding: 9px 12px; border: 1.5px solid var(–border);
border-radius: 3px; cursor: pointer; font-size: 0.86rem;
background: var(–paper); color: var(–ink);
text-align: left; transition: all 0.15s;
font-family: ‘Noto Serif TC’, serif; line-height: 1.5;
}
.choice:hover:not(:disabled) { border-color: var(–gold); background: #fff8ee; }
.choice:disabled { cursor: default; }
.choice.correct { border-color: var(–sage); background: #f0fff4; color: var(–sage); }
.choice.wrong   { border-color: var(–rust); background: #fff5f5; color: var(–rust); }
.choice-letter {
font-family: ‘Fira Code’, monospace; font-weight: 700;
font-size: 0.78rem; min-width: 14px; flex-shrink: 0; padding-top: 1px;
}

/* tip & explanation */
.tip-box {
display: none; padding: 12px 14px; margin-bottom: 10px;
background: #fffbeb; border: 1px solid rgba(184,133,42,0.3);
border-radius: 3px; font-size: 0.84rem; line-height: 1.75;
animation: fadeUp 0.25s ease;
}
.exp-box {
display: none; padding: 13px 15px;
background: var(–cream); border: 1px solid var(–border);
border-left: 3px solid var(–sky);
border-radius: 3px; font-size: 0.84rem; line-height: 1.85;
animation: fadeUp 0.25s ease;
}
.box-label {
font-family: ‘Fira Code’, monospace; font-size: 0.6rem;
letter-spacing: 0.18em; text-transform: uppercase;
margin-bottom: 5px;
}
.tip-box .box-label { color: var(–gold); }
.exp-box .box-label { color: var(–sky); }

/* overall tip */
.overall-tip {
background: #fff;
border: 1px solid var(–border);
border-top: 3px solid var(–gold);
border-radius: 3px;
padding: 16px 18px;
margin-bottom: 20px;
}
.overall-tip-title {
font-weight: 700; font-size: 0.92rem;
margin-bottom: 8px; color: var(–gold);
}
.overall-tip-text { font-size: 0.86rem; line-height: 1.85; color: var(–muted); }

.btn-reset {
width: 100%; padding: 11px;
background: none; border: 1px solid var(–border);
color: var(–muted); border-radius: 3px;
cursor: pointer; font-family: ‘Noto Serif TC’, serif;
font-size: 0.88rem; letter-spacing: 0.06em;
transition: all 0.18s;
}
.btn-reset:hover { border-color: var(–gold); color: var(–gold); }

/* ── Responsive ────────────────────────────────────────────────────── */
@media (max-width: 600px) {
body::after { display: none; }
header { flex-direction: column; align-items: flex-start; }
}
</style>

</head>
<body>
<div class="wrap">

  <!-- Header -->

  <header>
    <div>
      <div class="brand-title">數學題目<span>辨識練習</span></div>
      <div class="brand-sub">Math Quiz · AI Powered · 群組版</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">已答題</div></div>
      <div class="stat"><div class="stat-n" id="sCorrect">0</div><div class="stat-l">答對</div></div>
      <div class="stat"><div class="stat-n" id="sStreak">0🔥</div><div class="stat-l">連勝</div></div>
    </div>
  </header>

  <!-- API Key -->

  <div class="api-panel" id="apiPanel">
    <div class="api-row">
      <input class="api-input" id="apiKeyInput" type="password"
        placeholder="AIzaSy..." autocomplete="off">
      <button class="btn-save" onclick="saveKey()">儲存金鑰</button>
    </div>
    <div class="api-hint">
      API 金鑰儲存在你自己的瀏覽器，不會上傳。
      免費取得金鑰請前往 <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>　｜　完全免費，無需信用卡
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <!-- Upload -->

  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">📄</span>
    <div class="upload-title">上傳數學題目圖片</div>
    <div class="upload-hint-text">支援 JPG · PNG · WEBP　｜　點擊或拖曳上傳</div>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <!-- Preview -->

  <div id="previewWrap">
    <div class="preview-bar">
      <span id="fileName">image.jpg</span>
      <button class="btn-rm" onclick="removeImg()">✕ 移除</button>
    </div>
    <div class="preview-img-wrap">
      <img id="previewImg" src="" alt="預覽">
    </div>
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="analyze()" disabled>
    🔍 開始 AI 分析，生成題目
  </button>

  <!-- Loading -->

  <div id="loadingArea">
    <div class="spinner">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>
    <div class="loading-text" id="loadingText">正在讀取圖片⋯</div>
  </div>

  <!-- Results -->

  <div id="resultsArea">
    <div class="results-title">📋 題目整理</div>
    <div class="summary-card">
      <div class="card-label">題目分析摘要</div>
      <div class="summary-text" id="summaryText"></div>
    </div>
    <div class="q-list" id="qList"></div>
    <div class="overall-tip">
      <div class="overall-tip-title">💛 學習建議</div>
      <div class="overall-tip-text" id="overallTip"></div>
    </div>
    <button class="btn-reset" onclick="resetAll()">↺ 上傳新圖片，重新練習</button>
  </div>

</div><!-- /wrap -->

<script>
/* ── State ──────────────────────────────────────────────────────────── */
let imgBase64 = '', imgType = '', apiKey = '';
let stats = { total: 0, correct: 0, streak: 0 };
const STEPS = ['正在讀取圖片⋯','分析數學內容⋯','生成練習題⋯','撰寫詳解⋯'];
let stepTimer, stepIdx = 0;

const BADGES = {
  arithmetic: ['四則運算','badge-arithmetic'],
  algebra:    ['代數','badge-algebra'],
  geometry:   ['幾何','badge-geometry'],
  calculus:   ['微積分','badge-calculus'],
  stats:      ['統計','badge-stats'],
  other:      ['其他','badge-other'],
};

/* ── Init ───────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('math_quiz_gemini_key');
  if (saved) {
    apiKey = saved;
    const inp = document.getElementById('apiKeyInput');
    inp.value = saved;
    inp.classList.add('saved');
    document.getElementById('apiStatus').textContent = '✓ 金鑰已儲存';
    document.getElementById('apiStatus').className = 'api-status ok';
    updateAnalyzeBtn();
  }
});

/* ── API Key ────────────────────────────────────────────────────────── */
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('AIza')) {
    document.getElementById('apiStatus').textContent = '⚠ 格式錯誤，Gemini Key 應以 AIza 開頭';
    document.getElementById('apiStatus').className = 'api-status err';
    return;
  }
  apiKey = val;
  localStorage.setItem('math_quiz_gemini_key', val);
  document.getElementById('apiKeyInput').classList.add('saved');
  document.getElementById('apiStatus').textContent = '✓ 已儲存到此瀏覽器';
  document.getElementById('apiStatus').className = 'api-status ok';
  updateAnalyzeBtn();
}

/* ── File handling ──────────────────────────────────────────────────── */
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    compress(ev.target.result, (b64, size) => {
      imgBase64 = b64;
      imgType = 'image/jpeg';
      document.getElementById('previewImg').src = 'data:image/jpeg;base64,' + b64;
      const kb = Math.round(size / 1024);
      document.getElementById('fileName').textContent =
        file.name + '  →  壓縮後 ' + (kb > 1024 ? (kb/1024).toFixed(1)+'MB' : kb+'KB');
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('resultsArea').style.display = 'none';
      updateAnalyzeBtn();
    });
  };
  reader.readAsDataURL(file);
}

function compress(dataUrl, cb) {
  const img = new Image();
  img.onload = () => {
    const MAX = 2048, LIMIT = 1*1024*1024;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
      else        { w = Math.round(w*MAX/h); h = MAX; }
    }
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
    ctx.drawImage(img, 0, 0, w, h);
    const attempt = q => {
      const r = cv.toDataURL('image/jpeg', q);
      const b64 = r.split(',')[1];
      const sz = Math.round(b64.length * 3/4);
      if (sz <= LIMIT || q <= 0.3) cb(b64, sz);
      else attempt(Math.max(q-0.08, 0.3));
    };
    attempt(0.92);
  };
  img.src = dataUrl;
}

function removeImg() {
  imgBase64 = ''; imgType = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'none';
  document.getElementById('fileInput').value = '';
  updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
  document.getElementById('analyzeBtn').disabled = !(imgBase64 && apiKey);
}

/* ── Analyze ────────────────────────────────────────────────────────── */
async function analyze() {
  if (!imgBase64 || !apiKey) return;

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultsArea').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'flex';
  stepIdx = 0;
  stepTimer = setInterval(() => {
    stepIdx = (stepIdx+1) % STEPS.length;
    document.getElementById('loadingText').textContent = STEPS[stepIdx];
  }, 1800);

  const prompt = `你是一位專業的高中數學老師。請仔細閱讀這張數學題目圖片，完成以下任務：
1. 辨識題目的數學類型與內容（四則運算、代數方程、幾何、微積分、統計等）
2. 根據圖片中的題目或概念，生成 4 道相關練習題（選擇題，難度由易到難）
3. 每題提供 4 個選項（A/B/C/D），只有一個正確答案
4. 每題提供溫馨提示（不超過 40 字，不洩露答案，語氣親切鼓勵）
5. 每題提供詳細解題說明（含完整步驟，用 $...$ 包裹 LaTeX 行內公式，用 $$...$$ 包裹獨立公式）
6. 最後給整體學習建議（2-3 句，溫馨鼓勵語氣）

請嚴格只回傳以下 JSON，不含任何其他文字或 markdown：
{"summary":"題目分析摘要","questions":[{"id":1,"type":"algebra","text":"題目","choices":{"A":"","B":"","C":"","D":""},"answer":"A","tip":"溫馨提示","explanation":"詳細解說"}],"overallTip":"學習建議"}
type 只能是：arithmetic / algebra / geometry / calculus / stats / other`;

  try {
    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    const res = await fetch(geminiUrl, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: imgType, data: imgBase64 } },
            { text: prompt }
          ]
        }],
        generationConfig: { maxOutputTokens: 4000, temperature: 0.3 }
      })
    });

    clearInterval(stepTimer);
    document.getElementById('loadingArea').style.display = 'none';

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message || `HTTP ${res.status}`;
      if (res.status === 400) showErr('API 金鑰無效，請確認 Gemini Key 正確（應以 AIza 開頭）。');
      else if (res.status === 429) showErr('請求太頻繁，請稍等幾秒再試。');
      else showErr('API 錯誤：' + msg);
      document.getElementById('analyzeBtn').disabled = false;
      return;
    }

    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('未偵測到數學題目，請上傳清晰的數學題目圖片。');

    const result = JSON.parse(match[0]);
    if (!result.questions?.length) throw new Error('無法從圖片生成題目，請換一張圖片。');

    renderResults(result);

  } catch(e) {
    clearInterval(stepTimer);
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
    showErr(e.message);
  }
}

/* ── Render ─────────────────────────────────────────────────────────── */
function renderResults(r) {
  document.getElementById('summaryText').innerHTML = r.summary;
  document.getElementById('overallTip').innerHTML = r.overallTip;
  document.getElementById('resultsArea').style.display = 'block';

  const list = document.getElementById('qList');
  list.innerHTML = '';

  r.questions.forEach((q, i) => {
    const [bl, bc] = BADGES[q.type] || BADGES.other;
    const letters = ['A','B','C','D'];
    const card = document.createElement('div');
    card.className = 'q-card';
    card.style.animationDelay = (i * 0.07) + 's';

    card.innerHTML = `
      <div class="q-head" onclick="toggleCard(this)">
        <span class="q-num">Q${q.id}</span>
        <span class="q-badge ${bc}">${bl}</span>
        <span class="q-text">${q.text}</span>
        <span class="q-chevron">▼</span>
      </div>
      <div class="q-body">
        <div class="choices-grid" id="ch-${q.id}">
          ${letters.map(l => `
            <button class="choice" data-l="${l}" data-ans="${q.answer}"
              data-tip="${encodeURIComponent(q.tip)}"
              data-exp="${encodeURIComponent(q.explanation)}"
              data-qid="${q.id}"
              onclick="pick(this)">
              <span class="choice-letter">${l}</span>
              <span>${q.choices[l]}</span>
            </button>`).join('')}
        </div>
        <div class="tip-box" id="tip-${q.id}">
          <div class="box-label">💛 溫馨提示</div>
          <div id="tip-txt-${q.id}"></div>
        </div>
        <div class="exp-box" id="exp-${q.id}">
          <div class="box-label">📖 詳細解說</div>
          <div id="exp-txt-${q.id}"></div>
        </div>
      </div>`;

    list.appendChild(card);
  });

  // open first card
  const first = list.querySelector('.q-head');
  if (first) toggleCard(first);

  if (window.MathJax) MathJax.typesetPromise([list, document.getElementById('summaryText')]);
  window.scrollTo({ top: document.getElementById('resultsArea').offsetTop - 16, behavior: 'smooth' });
}

function toggleCard(head) {
  head.closest('.q-card').classList.toggle('open');
}

function pick(btn) {
  const qid = btn.dataset.qid;
  if (btn.closest('.q-card').dataset.done) return;
  btn.closest('.q-card').dataset.done = '1';

  const ans = btn.dataset.ans;
  document.querySelectorAll(`#ch-${qid} .choice`).forEach(b => {
    b.disabled = true;
    if (b.dataset.l === ans) b.classList.add('correct');
  });
  if (btn.dataset.l !== ans) btn.classList.add('wrong');

  // tip
  const tipEl = document.getElementById('tip-' + qid);
  tipEl.style.display = 'block';
  document.getElementById('tip-txt-' + qid).textContent = decodeURIComponent(btn.dataset.tip);

  // explanation
  const expEl = document.getElementById('exp-' + qid);
  expEl.style.display = 'block';
  document.getElementById('exp-txt-' + qid).innerHTML = decodeURIComponent(btn.dataset.exp);

  // stats
  stats.total++;
  const correct = btn.dataset.l === ans;
  if (correct) { stats.correct++; stats.streak++; }
  else { stats.streak = 0; }
  document.getElementById('sTotal').textContent = stats.total;
  document.getElementById('sCorrect').textContent = stats.correct;
  document.getElementById('sStreak').textContent = stats.streak + '🔥';

  if (window.MathJax) MathJax.typesetPromise([tipEl, expEl]);
}

function showErr(msg) {
  document.getElementById('resultsArea').style.display = 'block';
  document.getElementById('summaryText').innerHTML = '';
  document.getElementById('overallTip').innerHTML = '';
  document.getElementById('qList').innerHTML = `<div class="error-box">⚠️ ${msg}</div>`;
}

function resetAll() {
  removeImg();
  document.getElementById('resultsArea').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
